tool_calls:
  - name: read_file
    arguments:
      path: src/index.ts
      encoding: utf-8
      offset: 0
      limit: 50
  - name: grep_code
    arguments:
      query: export default
      path: src/
      include: '*.ts'
      case_insensitive: false
      max_matches: 20
  - name: search_files
    arguments:
      pattern: '**/*.test.ts'
      directory: src/
      max_results: 10
      include_hidden: false
      file_type: file
  - name: run_terminal
    arguments:
      command: npm run build
      cwd: .
      timeout_ms: 60000
      capture_output: true
  - name: deploy_service
    arguments:
      service: api-gateway
      environment: staging
      region: us-east-1
      replicas: 2
      memory_mb: 1024
      cpu: 1.0
      health_check_path: /health
      rollback_on_failure: true
  - name: monitoring_alert
    arguments:
      action: create
      name: High Latency Alert
      metric: request_latency_p99
      condition: gt
      threshold: 500
      duration_minutes: 5
      notify_channels:
        - slack
        - pagerduty
      severity: critical
