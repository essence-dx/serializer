project:
  name: dx-os
  version: 1.0.0
  description: DX Operating System
  license: Apache-2.0
  repository: https://github.com/essence-dx/os
build:
  compiler: gcc
  std: c++23
  opt: -O2
  static: true
recipes:
  - name: build
    group: all
    doc: Build all workspace crates
    script: cargo build --workspace
  - name: build-release
    group: all
    doc: Build all crates in release mode
    script: cargo build --workspace --release
  - name: check
    group: all
    doc: Run cargo check on the whole workspace
    script: cargo check --workspace
  - name: build-cli
    group: cli
    doc: Build dx-cli
    script: cargo build --manifest-path cli/Cargo.toml
  - name: build-serializer
    group: serializer
    doc: Build dx-serializer
    script: cargo build --manifest-path serializer/Cargo.toml
  - name: build-script
    group: script
    doc: Build dx-script
    script: cargo build --manifest-path script/Cargo.toml
  - name: build-forge
    group: forge
    doc: Build dx-forge
    script: cargo build --manifest-path forge/Cargo.toml
  - name: build-style
    group: style
    doc: Build dx-style
    script: cargo build --manifest-path style/Cargo.toml
  - name: test
    group: all
    doc: Run all workspace tests
    script: cargo test --workspace
  - name: test-cli
    group: cli
    doc: Test dx-cli
    script: cargo test --manifest-path cli/Cargo.toml
  - name: test-serializer
    group: serializer
    doc: Test dx-serializer
    script: cargo test --manifest-path serializer/Cargo.toml
  - name: lint
    group: all
    doc: Run clippy on workspace
    script: cargo clippy --workspace -- -D warnings
  - name: fmt
    group: all
    doc: Check formatting
    script: cargo fmt --check
  - name: audit
    group: all
    doc: Run cargo audit
    script: cargo audit
  - name: dev-www
    group: www
    doc: Start DX-WWW dev server
    script: dx dev
  - name: serialize
    group: serializer
    doc: Serialize dx config to LLM format
    script: dx-serializer human dx
aliases:
  - name: b
    target: build
  - name: br
    target: build-release
  - name: c
    target: check
  - name: t
    target: test
  - name: l
    target: lint
  - name: f
    target: fmt
  - name: a
    target: audit
ci:
  runner: ubuntu-latest
  timeout: 30
  parallel: true
  steps:
    - name: checkout
      script: actions/checkout@v4
    - name: setup
      script: actions/setup-node@v4
    - name: build
      script: cargo build --workspace
    - name: test
      script: cargo test --workspace
    - name: lint
      script: cargo clippy --workspace -- -D warnings
dependencies:
  - name: serde
    version: '1.0'
    optional: false
  - name: tokio
    version: '1.35'
    optional: false
  - name: clap
    version: '4.5'
    optional: false
  - name: rayon
    version: '1.9'
    optional: true
  - name: tracing
    version: '0.1'
    optional: false
  - name: reqwest
    version: '0.12'
    optional: true
features:
  default:
    - serde
    - tokio
    - clap
    - tracing
  gpu: true
  wasm: false
tags:
  - serialization
  - performance
  - zero-copy
  - llm
